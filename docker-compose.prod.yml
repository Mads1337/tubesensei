services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: tubesensei
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tubesensei
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tubesensei -d tubesensei"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    build: .
    command: >
      gunicorn tubesensei.app.main_enhanced:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers ${WORKERS:-4}
      --bind 0.0.0.0:8001
      --access-logfile -
      --error-logfile -
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECURITY_SECRET_KEY: ${SECURITY_SECRET_KEY}
      ENVIRONMENT: production
      DEBUG: "False"
      RELOAD: "False"
      SECURITY_SESSION_COOKIE_SECURE: "True"
      SECURITY_ALLOWED_ORIGINS: ${SECURITY_ALLOWED_ORIGINS:-["https://localhost"]}
      SECURITY_ALLOWED_HOSTS: ${SECURITY_ALLOWED_HOSTS:-["localhost"]}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  worker:
    build: .
    command: >
      celery -A tubesensei.app.celery_app worker
      --loglevel=info
      -Q discovery,transcripts,batch,metadata,campaigns
      --concurrency=${WORKER_CONCURRENCY:-4}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECURITY_SECRET_KEY: ${SECURITY_SECRET_KEY}
      ENVIRONMENT: production
      DEBUG: "False"
      RELOAD: "False"
      SECURITY_SESSION_COOKIE_SECURE: "True"
      SECURITY_ALLOWED_ORIGINS: ${SECURITY_ALLOWED_ORIGINS:-["https://localhost"]}
      SECURITY_ALLOWED_HOSTS: ${SECURITY_ALLOWED_HOSTS:-["localhost"]}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    command: >
      celery -A tubesensei.app.celery_app beat
      --loglevel=info
      --schedule=/app/celerybeat-schedule.db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/0
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECURITY_SECRET_KEY: ${SECURITY_SECRET_KEY}
      ENVIRONMENT: production
      DEBUG: "False"
      RELOAD: "False"
      SECURITY_SESSION_COOKIE_SECURE: "True"
      SECURITY_ALLOWED_ORIGINS: ${SECURITY_ALLOWED_ORIGINS:-["https://localhost"]}
      SECURITY_ALLOWED_HOSTS: ${SECURITY_ALLOWED_HOSTS:-["localhost"]}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    image: mher/flower:2.0.1
    command: celery flower --broker=redis://:${REDIS_PASSWORD}@redis:6379/0 --port=5555
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      FLOWER_PORT: "5555"
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:changeme}
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
