# TubeSensei Nginx Reverse Proxy Configuration
#
# SSL certificates should be mounted at /etc/nginx/ssl/
# Expected files:
#   /etc/nginx/ssl/fullchain.pem  - SSL certificate chain
#   /etc/nginx/ssl/privkey.pem    - SSL private key
#
# Add the following volume to the nginx service in docker-compose.prod.yml:
#   - /path/to/your/certs:/etc/nginx/ssl:ro

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS proxy to app
server {
    listen 443 ssl;
    server_name _;

    # SSL certificate paths (mount your certs here)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Increase max upload size
    client_max_body_size 10m;

    # Proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    location / {
        proxy_pass http://app:8001;
    }
}
